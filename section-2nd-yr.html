<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Section Selection</title>
    <style>
    .section-title {
    text-align: center;
    margin-bottom: 25px;
}

.section-title h3 {
    font-size: 16px;
    letter-spacing: 1px;
    font-weight: 600;
    color: #555;
}

.section-buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Button Style */
.section-btn {
       display: block;
            align-items: center;
            gap: 10px;
            background: #f2c8ff;
            color: #000;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
}

/* Hover Effect */
.section-btn:hover {
    transform: translateY(-3px);
  
     background: #e5a7ff;
}

/* Click Effect */
.section-btn:active {
    transform: scale(0.97);
}

</style>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Your CSS File -->
    <link rel="stylesheet" href="select-yr.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        Department of Computer Science
    </header>

        <div class="dashboard-card">


            <!-- Select Section Text -->

</div>

</div>

    </div>

</body>
</html>
